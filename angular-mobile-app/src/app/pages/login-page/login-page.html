<div class="login-page">
  <div class="brand">DA<span>vai</span></div>

  <div class="login-card">
    <div class="avatar-wrapper">
      <div class="avatar-circle">
        <mat-icon>person</mat-icon>
      </div>
    </div>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="login-form">
      <div class="field-group">
        <label for="userid">User ID</label>
        @if (getFieldError('userid')) {
          <p class="field-error">{{ getFieldError('userid') }}</p>
        }

        <mat-form-field appearance="outline" class="full-width">
          <input
            matInput
            id="userid"
            type="text"
            placeholder="Enter HSE userid"
            formControlName="userid"
          />
        </mat-form-field>
      </div>

      <div class="field-group">
        <label for="password">Password</label>
        @if (getFieldError('password')) {
          <p class="field-error">{{ getFieldError('password') }}</p>
        }

        <mat-form-field appearance="outline" class="full-width">
          <input
            matInput
            id="password"
            [type]="hidePassword ? 'password' : 'text'"
            placeholder="Enter password"
            formControlName="password"
          />

          <button type="button" mat-icon-button matSuffix (click)="hidePassword = !hidePassword">
            <mat-icon>
              {{ hidePassword ? 'visibility_off' : 'visibility' }}
            </mat-icon>
          </button>
        </mat-form-field>
      </div>

      <button mat-flat-button class="login-button" type="submit">LOGIN</button>

      <p class="register-text">
        No account?
        <span class="link" (click)="goToRegister()">Register</span>
      </p>
    </form>
  </div>
</div>
