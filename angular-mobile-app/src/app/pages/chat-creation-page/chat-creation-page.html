<div class="page-container">
  <div class="page-content">
    <div>
      <div class="header-row">
        <button type="button" class="back-button" (click)="goBack()">
          <mat-icon>arrow_back</mat-icon>
        </button>

        <h2>Create Chat</h2>
      </div>

      <div class="chat-form">
        <input type="text" name="chatname" [(ngModel)]="chatname" placeholder="Chat name" />

        <label class="public-checkbox" (click)="ispublic = !ispublic">
          <mat-icon class="checkbox-icon">
            {{ ispublic ? 'check_box' : 'check_box_outline_blank' }}
          </mat-icon>

          <span>Public chat</span>
        </label>
      </div>

      <div class="search-bar">
        <input type="text" name="searchText" [(ngModel)]="searchText" placeholder="Search" />

        <mat-icon>search</mat-icon>
      </div>
    </div>

    <div class="profile-list">
      @for (profile of filteredProfiles; track profile.hash) {
        <button type="button" class="profile-card" (click)="toggleProfile(profile)">
          <div class="avatar" [style.background-color]="getAvatarColor(profile.hash)">
            {{ profile.nickname.charAt(0).toUpperCase() }}
          </div>

          <div class="profile-info">
            <strong>{{ profile.nickname }}</strong>
          </div>

          <mat-icon class="checkbox-icon">
            {{ isSelected(profile) ? 'check_box' : 'check_box_outline_blank' }}
          </mat-icon>
        </button>
      } @empty {
        <p class="empty-text">No profiles found</p>
      }
    </div>

    <button type="button" class="create-button" (click)="onCreate()" [disabled]="!chatname.trim()">
      <mat-icon>near_me</mat-icon>
      <span>Create</span>
    </button>
  </div>
</div>
